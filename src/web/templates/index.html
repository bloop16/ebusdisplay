<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Display - Konfiguration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-weight: 500;
        }
        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
        }
        .tab:hover {
            background: #f8f8f8;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
            margin-bottom: 10px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            color: #333;
            font-weight: 500;
        }
        .results {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }
        .result-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .result-item:hover {
            background: #f8f8f8;
        }
        .selected-stops {
            margin: 20px 0;
        }
        .stop-chip {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 14px;
        }
        .stop-chip button {
            background: none;
            border: none;
            color: white;
            margin-left: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn.secondary {
            background: #6c757d;
        }
        .btn.secondary:hover {
            background: #5a6268;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .wifi-status {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .wifi-status.connected {
            background: #d4edda;
        }
        .departures-live {
            margin-top: 20px;
        }
        .departure-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            align-items: center;
        }
        .departure-item:last-child {
            border-bottom: none;
        }
        .departure-line {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }
        .departure-destination {
            flex: 1;
            margin: 0 15px;
            font-weight: 500;
        }
        .departure-time {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }
        .departure-delay {
            color: #dc3545;
            font-size: 12px;
            margin-left: 8px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚍 Bus Display</h1>
        <p class="subtitle">Konfiguration & Live-Abfahrten</p>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('stops')">🚏 Haltestellen</div>
            <div class="tab" onclick="switchTab('live')">⏱️ Live-Abfahrten</div>
            <div class="tab" onclick="switchTab('wifi')">📡 WiFi</div>
        </div>
        
        <!-- Haltestellen Tab -->
        <div id="tab-stops" class="tab-content active">
            <div class="search-box">
                <label for="searchInput">Haltestelle suchen</label>
                <input type="text" id="searchInput" placeholder="z.B. Bregenz Bahnhof, Dornbirn...">
                <div id="results" class="results"></div>
            </div>
            
            <label>Ausgewählte Haltestellen</label>
            <div id="selectedStops" class="selected-stops"></div>
            
            <button class="btn" onclick="saveConfig()">💾 Konfiguration speichern</button>
            <div id="status" class="status"></div>
        </div>
        
        <!-- Live-Abfahrten Tab -->
        <div id="tab-live" class="tab-content">
            <label>Wähle eine Haltestelle</label>
            <select id="liveStopSelect" class="btn secondary" onchange="loadLiveDepartures()">
                <option value="">-- Bitte wählen --</option>
            </select>
            
            <div id="liveDepartures" class="departures-live">
                <p class="loading">Wähle eine Haltestelle um Live-Abfahrten zu sehen</p>
            </div>
            
            <button class="btn secondary" onclick="loadLiveDepartures()" style="margin-top: 20px">🔄 Aktualisieren</button>
        </div>
        
        <!-- WiFi Tab -->
        <div id="tab-wifi" class="tab-content">
            <div id="wifiStatus" class="wifi-status">
                <strong>Status:</strong> <span id="wifiStatusText">Wird geladen...</span>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 15px">Mit WiFi verbinden</h3>
                <label for="wifiSSID">SSID (Netzwerkname)</label>
                <input type="text" id="wifiSSID" placeholder="MeinWLAN">
                
                <label for="wifiPassword">Passwort</label>
                <input type="password" id="wifiPassword" placeholder="••••••••">
                
                <button class="btn" onclick="connectWiFi()">📡 Verbinden</button>
            </div>
            
            <div id="wifiStatusMsg" class="status"></div>
        </div>
    </div>

    <script>
        let selectedStops = [];
        let searchTimeout;
        
        // Load config on page load
        window.addEventListener('load', () => {
            loadConfig();
            checkWiFiStatus();
        });
        
        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // Load tab-specific data
            if (tabName === 'live') {
                updateLiveStopSelect();
            } else if (tabName === 'wifi') {
                checkWiFiStatus();
            }
        }
        
        function loadConfig() {
            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    selectedStops = data.stops || [];
                    updateSelectedStops();
                });
        }
        
        // Search stops
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value;
            
            if (query.length < 2) {
                document.getElementById('results').style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(() => {
                fetch(`/api/stops?q=${encodeURIComponent(query)}`)
                    .then(r => r.json())
                    .then(stops => {
                        const results = document.getElementById('results');
                        results.innerHTML = '';
                        
                        if (stops.length === 0) {
                            results.innerHTML = '<div class="result-item">Keine Ergebnisse gefunden</div>';
                        } else {
                            stops.forEach(stop => {
                                const div = document.createElement('div');
                                div.className = 'result-item';
                                div.textContent = stop.name;
                                div.onclick = () => addStop(stop);
                                results.appendChild(div);
                            });
                        }
                        
                        results.style.display = 'block';
                    });
            }, 300);
        });
        
        function addStop(stop) {
            if (!selectedStops.find(s => s.id === stop.id)) {
                selectedStops.push(stop);
                updateSelectedStops();
            }
            document.getElementById('searchInput').value = '';
            document.getElementById('results').style.display = 'none';
        }
        
        function removeStop(stopId) {
            selectedStops = selectedStops.filter(s => s.id !== stopId);
            updateSelectedStops();
        }
        
        function updateSelectedStops() {
            const container = document.getElementById('selectedStops');
            container.innerHTML = '';
            
            if (selectedStops.length === 0) {
                container.innerHTML = '<p style="color: #999; padding: 10px 0">Noch keine Haltestellen ausgewählt</p>';
                return;
            }
            
            selectedStops.forEach(stop => {
                const chip = document.createElement('span');
                chip.className = 'stop-chip';
                chip.innerHTML = `${stop.name} <button onclick="removeStop('${stop.id}')">×</button>`;
                container.appendChild(chip);
            });
        }
        
        function saveConfig() {
            const config = { stops: selectedStops };
            
            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            })
            .then(r => r.json())
            .then(data => {
                showStatus('status', 'Konfiguration gespeichert! ✓', 'success');
            })
            .catch(err => {
                showStatus('status', 'Fehler beim Speichern', 'error');
            });
        }
        
        // Live Departures
        function updateLiveStopSelect() {
            const select = document.getElementById('liveStopSelect');
            select.innerHTML = '<option value="">-- Bitte wählen --</option>';
            
            selectedStops.forEach(stop => {
                const option = document.createElement('option');
                option.value = stop.id;
                option.textContent = stop.name;
                select.appendChild(option);
            });
        }
        
        function loadLiveDepartures() {
            const stopId = document.getElementById('liveStopSelect').value;
            const container = document.getElementById('liveDepartures');
            
            if (!stopId) {
                container.innerHTML = '<p class="loading">Wähle eine Haltestelle um Live-Abfahrten zu sehen</p>';
                return;
            }
            
            container.innerHTML = '<p class="loading">Lade Abfahrten...</p>';
            
            fetch(`/api/departures?stop_id=${stopId}&limit=10`)
                .then(r => r.json())
                .then(departures => {
                    if (departures.length === 0) {
                        container.innerHTML = '<p class="loading">Keine Abfahrten in nächster Zeit</p>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    departures.forEach(dep => {
                        const div = document.createElement('div');
                        div.className = 'departure-item';
                        
                        const time = new Date(dep.departure_time);
                        const now = new Date();
                        const minutesUntil = Math.round((time - now) / 60000);
                        
                        let timeStr = minutesUntil <= 0 ? 'Jetzt' : `${minutesUntil} min`;
                        
                        div.innerHTML = `
                            <span class="departure-line">${dep.line}</span>
                            <span class="departure-destination">${dep.destination}</span>
                            <span class="departure-time">${timeStr}${dep.delay_minutes ? `<span class="departure-delay">+${dep.delay_minutes}</span>` : ''}</span>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(err => {
                    container.innerHTML = '<p class="loading">Fehler beim Laden der Abfahrten</p>';
                });
        }
        
        // WiFi
        function checkWiFiStatus() {
            fetch('/api/wifi/status')
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('wifiStatusText');
                    const container = document.getElementById('wifiStatus');
                    
                    if (data.connected) {
                        status.textContent = `Verbunden mit "${data.ssid}"`;
                        container.classList.add('connected');
                    } else {
                        status.textContent = 'Nicht verbunden';
                        container.classList.remove('connected');
                    }
                })
                .catch(err => {
                    document.getElementById('wifiStatusText').textContent = 'Status unbekannt';
                });
        }
        
        function connectWiFi() {
            const ssid = document.getElementById('wifiSSID').value;
            const password = document.getElementById('wifiPassword').value;
            
            if (!ssid || !password) {
                showStatus('wifiStatusMsg', 'Bitte SSID und Passwort eingeben', 'error');
                return;
            }
            
            showStatus('wifiStatusMsg', 'Verbinde...', 'info');
            
            fetch('/api/wifi/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ssid, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showStatus('wifiStatusMsg', 'Verbindung erfolgreich! ✓', 'success');
                    setTimeout(checkWiFiStatus, 2000);
                } else {
                    showStatus('wifiStatusMsg', data.error || 'Verbindung fehlgeschlagen', 'error');
                }
            })
            .catch(err => {
                showStatus('wifiStatusMsg', 'Fehler beim Verbinden', 'error');
            });
        }
        
        function showStatus(elementId, message, type) {
            const status = document.getElementById(elementId);
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
